version: "3.9"

# ── Local development setup ────────────────────────────────────────────────────
# PostgreSQL runs in Docker. Backend and frontend run locally (virtualenv + npm).
# The database `vision_ai` is created automatically by Docker on first start.
# No manual createdb needed.
#
# Typical dev usage:
#   docker-compose up -d postgres        ← start DB only
#   source backend/.venv/bin/activate
#   uvicorn app.main:app --reload --port 8000
#   cd frontend && npm run dev
#
# Full stack in Docker (optional, for deployment testing):
#   docker-compose up --build
# ──────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16
    container_name: medmind-postgres
    environment:
      POSTGRES_DB: vision_ai        # created automatically — no createdb needed
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - medmind_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vision_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: medmind-backend
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres                         # Docker service name
      OLLAMA_HOST: http://host.docker.internal:11434  # Ollama on Mac host
      TOKENIZERS_PARALLELISM: "false"                 # avoid fork/deadlock warning
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data   # NOTEEVENTS.csv and processed outputs
    depends_on:
      postgres:
        condition: service_healthy
    # Linux only: uncomment the two lines below so host.docker.internal resolves
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    container_name: medmind-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  medmind_pg:
