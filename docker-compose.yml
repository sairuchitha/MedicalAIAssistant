version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: vision-ai-postgres
    environment:
      POSTGRES_DB: vision_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - vision_ai_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vision_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: vision-ai-backend
    env_file:
      - ./backend/.env
    environment:
      # Override localhost → Docker service name
      POSTGRES_HOST: postgres
      # Reach Ollama running on Mac host
      OLLAMA_HOST: http://host.docker.internal:11434
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: vision-ai-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  vision_ai_pg:
